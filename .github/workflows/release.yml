name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sni-bypass-rs-tui

jobs:
  # ─────────────────────────────────────────────
  # Build matrix for all targets
  # ─────────────────────────────────────────────
  build:
    name: Build [${{ matrix.target }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: sni-bypass-rs-tui
            asset_name: sni-bypass-rs-tui-linux-x86_64
            cross: false

          # ── Linux ARM64 (server/Raspberry Pi) ──
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: sni-bypass-rs-tui
            asset_name: sni-bypass-rs-tui-linux-aarch64
            cross: true

          # ── Linux ARM32 (Raspberry Pi 32-bit) ──
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            artifact_name: sni-bypass-rs-tui
            asset_name: sni-bypass-rs-tui-linux-armv7
            cross: true

          # ── Android ARM64 (Termux) ──
          - target: aarch64-linux-android
            os: ubuntu-latest
            artifact_name: sni-bypass-rs-tui
            asset_name: sni-bypass-rs-tui-android-aarch64-termux
            cross: true
            is_android: true

          # ── Android ARM32 (Termux older devices) ──
          - target: armv7-linux-androideabi
            os: ubuntu-latest
            artifact_name: sni-bypass-rs-tui
            asset_name: sni-bypass-rs-tui-android-armv7-termux
            cross: true
            is_android: true

          # ── Windows x86_64 ──
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: sni-bypass-rs-tui.exe
            asset_name: sni-bypass-rs-tui-windows-x86_64
            cross: false

          # ── macOS x86_64 ──
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: sni-bypass-rs-tui
            asset_name: sni-bypass-rs-tui-macos-x86_64
            cross: false

          # ── macOS Apple Silicon ──
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: sni-bypass-rs-tui
            asset_name: sni-bypass-rs-tui-macos-aarch64
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust toolchain setup ──
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── Linux native deps (for x86_64-unknown-linux-gnu) ──
      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.cross == false
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libdbus-1-dev

      # ── Cross compilation tool ──
      - name: Install cross
        if: matrix.cross == true
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross --version

      # ── Android NDK setup (for Termux targets) ──
      - name: Setup Android NDK
        if: matrix.is_android == true
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Configure Android target env
        if: matrix.is_android == true
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

          # Set cargo config for Android
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-linux-android]
          linker = "aarch64-linux-android33-clang"

          [target.armv7-linux-androideabi]
          linker = "armv7a-linux-androideabi33-clang"
          EOF

          # Add NDK toolchain to PATH
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$TOOLCHAIN" >> $GITHUB_PATH

      # ── macOS: No extra deps needed (system OpenSSL / rustls) ──

      # ── Windows: No extra deps needed (rustls handles TLS) ──

      # ── Build ──
      - name: Build (native)
        if: matrix.cross == false
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --locked

      - name: Build (cross)
        if: matrix.cross == true && matrix.is_android != true
        run: |
          cross build \
            --release \
            --target ${{ matrix.target }} \
            --locked

      - name: Build (Android/cross)
        if: matrix.is_android == true
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: aarch64-linux-android33-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: armv7a-linux-androideabi33-clang
          # Use rustls features only (no OpenSSL for Android)
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cross build \
            --release \
            --target ${{ matrix.target }} \
            --locked

      # ── Strip binary (reduce size) ──
      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          if [ -f "$BINARY" ]; then
            strip "$BINARY" 2>/dev/null || true
            echo "Binary size: $(du -sh $BINARY | cut -f1)"
          fi

      # ── Package ──
      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          STAGING="staging/${{ matrix.asset_name }}"

          mkdir -p "$STAGING"
          cp "$BINARY" "$STAGING/"
          cp hosts.txt "$STAGING/" 2>/dev/null || true
          cp README.md "$STAGING/" 2>/dev/null || true

          # Add Termux install script for Android builds
          if [[ "${{ matrix.is_android }}" == "true" ]]; then
            cat > "$STAGING/INSTALL-TERMUX.md" << 'EOF'
          # Termux Installation

          1. Copy binary to Termux:
             ```
             cp sni-bypass-rs-tui-android-aarch64-termux /data/data/com.termux/files/home/
             ```

          2. Or download directly in Termux:
             ```
             pkg install wget
             wget https://github.com/mewshiam/sni-bypass-rs-tui/releases/latest/download/sni-bypass-rs-tui-android-aarch64-termux.tar.gz
             tar xzf sni-bypass-rs-tui-android-aarch64-termux.tar.gz
             cd sni-bypass-rs-tui-android-aarch64-termux
             chmod +x sni-bypass-rs-tui
             ./sni-bypass-rs-tui
             ```

          3. Add hosts.txt in same directory

          EOF
          fi

          # Create archive
          cd staging
          tar czf "${{ matrix.asset_name }}.tar.gz" "${{ matrix.asset_name }}/"
          echo "ASSET=staging/${{ matrix.asset_name }}.tar.gz" >> $GITHUB_ENV

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $Binary = "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}"
          $Staging = "staging\${{ matrix.asset_name }}"

          New-Item -ItemType Directory -Force -Path $Staging
          Copy-Item $Binary $Staging\
          if (Test-Path "hosts.txt") { Copy-Item hosts.txt $Staging\ }
          if (Test-Path "README.md") { Copy-Item README.md $Staging\ }

          Compress-Archive `
            -Path "$Staging\*" `
            -DestinationPath "staging\${{ matrix.asset_name }}.zip"

          echo "ASSET=staging/${{ matrix.asset_name }}.zip" >> $env:GITHUB_ENV

      # ── Upload artifact for release job ──
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ env.ASSET }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get release tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${{ steps.get_tag.outputs.TAG }}"
          cat > release_notes.md << EOF
          # SNI Bypass RS-TUI ${TAG}

          ## 🚀 What's New
          - Full TUI interface with ratatui
          - Integrated SNI scanner
          - Android/Termux support
          - Live proxy statistics

          ## 📦 Downloads

          | Platform | File |
          |----------|------|
          | 🐧 Linux x86_64 | \`sni-bypass-rs-tui-linux-x86_64.tar.gz\` |
          | 🐧 Linux ARM64 | \`sni-bypass-rs-tui-linux-aarch64.tar.gz\` |
          | 🐧 Linux ARMv7 | \`sni-bypass-rs-tui-linux-armv7.tar.gz\` |
          | 📱 Android ARM64 (Termux) | \`sni-bypass-rs-tui-android-aarch64-termux.tar.gz\` |
          | 📱 Android ARMv7 (Termux) | \`sni-bypass-rs-tui-android-armv7-termux.tar.gz\` |
          | 🪟 Windows x86_64 | \`sni-bypass-rs-tui-windows-x86_64.zip\` |
          | 🍎 macOS x86_64 | \`sni-bypass-rs-tui-macos-x86_64.tar.gz\` |
          | 🍎 macOS Apple Silicon | \`sni-bypass-rs-tui-macos-aarch64.tar.gz\` |

          ## 📱 Termux Quick Install
          \`\`\`bash
          # Download in Termux
          wget https://github.com/mewshiam/sni-bypass-rs-tui/releases/download/${TAG}/sni-bypass-rs-tui-android-aarch64-termux.tar.gz
          tar xzf sni-bypass-rs-tui-android-aarch64-termux.tar.gz
          cd sni-bypass-rs-tui-android-aarch64-termux
          chmod +x sni-bypass-rs-tui
          ./sni-bypass-rs-tui
          \`\`\`

          ## 🔑 Key Bindings
          | Key | Action |
          |-----|--------|
          | \`1-5\` | Switch tabs |
          | \`e/i\` | Edit mode |
          | \`s\` | Start/Stop proxy |
          | \`S\` | Start SNI scan |
          | \`u\` | Use selected SNI |
          | \`?\` | Help popup |
          | \`q\` | Quit |
          EOF

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG }}
          name: "SNI Bypass RS-TUI ${{ steps.get_tag.outputs.TAG }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Verify release (optional smoke test)
  # ─────────────────────────────────────────────
  verify:
    name: Verify Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.tag || github.ref_name }}"
          echo "[*] Verifying release assets..."
          gh release view "$TAG" \
            --repo ${{ github.repository }} \
            --json assets \
            --jq '.assets[].name' || true
