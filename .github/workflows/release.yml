name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: sni-bypass-rs-linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: sni-bypass-rs-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            name: sni-bypass-rs-macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            name: sni-bypass-rs-macos-arm64

          - target: x86_64-pc-windows-gnu
            os: windows-latest
            name: sni-bypass-rs-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- Linux ARM fix ---
      - name: Install cross-compilation tools (ARM Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      # --- Windows toolchain ---
      - name: Install MinGW
        if: matrix.target == 'x86_64-pc-windows-gnu'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Configure Windows linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: pwsh
        run: |
          $gcc = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe" -replace '\\','/'
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE/.cargo | Out-Null
          Add-Content -Path $env:USERPROFILE/.cargo/config.toml -Value '[target.x86_64-pc-windows-gnu]'
          Add-Content -Path $env:USERPROFILE/.cargo/config.toml -Value "linker = '$gcc'"

      # --- Build ---
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin sni-bypass-rs

      # --- Strip binaries (size optimization) ---
      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/sni-bypass-rs || true

      # --- Package Unix ---
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sni-bypass-rs dist/
          chmod +x dist/sni-bypass-rs
          tar -czf dist/${{ matrix.name }}.tar.gz -C dist sni-bypass-rs

      # --- Package Windows ---
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/sni-bypass-rs.exe dist/

          $sysFile = Get-ChildItem -Recurse -Path target -Filter "WinDivert64.sys" | Select-Object -First 1
          $dllFile = Get-ChildItem -Recurse -Path target -Filter "WinDivert.dll" | Select-Object -First 1

          if ($sysFile -and $dllFile) {
            Copy-Item $sysFile.FullName dist/
            Copy-Item $dllFile.FullName dist/
          } else {
            Write-Host "Downloading WinDivert..."
            Invoke-WebRequest -Uri "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip" -OutFile windivert.zip
            Expand-Archive windivert.zip -DestinationPath windivert
            Copy-Item windivert/WinDivert-2.2.2-A/x64/WinDivert.dll dist/
            Copy-Item windivert/WinDivert-2.2.2-A/x64/WinDivert64.sys dist/
          }

          Compress-Archive -Path dist/* -DestinationPath dist/${{ matrix.name }}.zip

      # --- Upload artifacts ---
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
